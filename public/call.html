<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Elite Closer — Live Session</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230d0d0d'/><text x='50' y='68' font-size='58' font-family='Helvetica Neue,Arial,sans-serif' font-weight='900' fill='%23e94560' text-anchor='middle'>E</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (async () => {
    const { createClient } = supabase;
    const sb = createClient('__SUPABASE_URL__', '__SUPABASE_ANON_KEY__');
    const { data } = await sb.auth.getSession();
    if (!data.session) window.location.href = '/auth.html';
    window._supabase = sb;
    window._session = data.session;
  })();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --card: #141414; --card2: #1a1a1a;
    --red: #e94560; --green: #16a34a; --text: #f0f0f0;
    --muted: #666; --border: #222;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* NAV */
  nav { background: #0d0d0d; border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
  .logo-mark { width: 28px; height: 28px; background: var(--red); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: #fff; }
  .logo-text { font-size: 15px; font-weight: 700; }
  .logo-text span { color: var(--red); }
  .btn-back { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn-back:hover { border-color: var(--muted); color: var(--text); }

  /* LAYOUT */
  .call-layout { display: grid; grid-template-columns: 1fr 360px; flex: 1; overflow: hidden; }

  /* LEFT -- CALL AREA */
  .call-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; border-right: 1px solid var(--border); }

  .prospect-info { text-align: center; margin-bottom: 48px; }
  .prospect-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: var(--muted); border: 3px solid var(--border); margin: 0 auto 20px; transition: all 0.3s; position: relative; }
  .prospect-avatar.speaking { border-color: var(--red); box-shadow: 0 0 0 8px rgba(233,69,96,0.1), 0 0 0 16px rgba(233,69,96,0.05); }
  .prospect-avatar.listening { border-color: #60a5fa; box-shadow: 0 0 0 8px rgba(96,165,250,0.1); }
  .pulse-ring { position: absolute; inset: -8px; border-radius: 50%; border: 2px solid var(--red); opacity: 0; animation: pulse 1.5s ease-out infinite; }
  @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.3); opacity: 0; } }
  .prospect-name-lg { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  .prospect-role-lg { font-size: 14px; color: var(--muted); }

  /* STATUS */
  .call-status-area { text-align: center; margin-bottom: 40px; }
  .status-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; }
  .call-timer-lg { font-size: 48px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .status-text { font-size: 14px; color: var(--muted); margin-top: 8px; min-height: 20px; }
  .status-text.active { color: var(--green); }
  .status-text.error { color: var(--red); }
  .status-text.connecting { color: #f5a623; }

  /* CONTROLS */
  .call-controls { display: flex; align-items: center; gap: 16px; }
  .btn-call-main { width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.2s; }
  .btn-call-main.start { background: var(--red); }
  .btn-call-main.start:hover { background: #c73652; transform: scale(1.05); }
  .btn-call-main.end { background: #333; }
  .btn-call-main.end:hover { background: #444; transform: scale(1.05); }
  .btn-mute { width: 48px; height: 48px; border-radius: 50%; background: var(--card2); border: 1px solid var(--border); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.15s; }
  .btn-mute:hover { background: var(--card); }
  .btn-mute.muted { background: var(--red); border-color: var(--red); }

  /* RIGHT -- TRANSCRIPT */
  .transcript-panel { display: flex; flex-direction: column; overflow: hidden; }
  .transcript-header { padding: 20px 24px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .transcript-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .transcript-messages::-webkit-scrollbar { width: 4px; }
  .transcript-messages::-webkit-scrollbar-track { background: transparent; }
  .transcript-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg { display: flex; flex-direction: column; gap: 4px; }
  .msg-speaker { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .msg-speaker.rep { color: #60a5fa; }
  .msg-speaker.prospect { color: var(--red); }
  .msg-text { font-size: 13px; line-height: 1.6; color: var(--text); background: var(--card2); border-radius: 8px; padding: 10px 14px; }
  .msg.rep .msg-text { background: rgba(96,165,250,0.08); }
  .transcript-empty { text-align: center; color: var(--muted); font-size: 13px; margin-top: 40px; line-height: 1.6; }

  /* SCORE SCREEN */
  .score-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; flex: 1; }
  .score-screen.visible { display: flex; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 6px solid var(--red); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 32px; }
  .score-number { font-size: 48px; font-weight: 900; color: var(--red); line-height: 1; }
  .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 4px; }
  .score-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
  .score-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 600px; margin-bottom: 32px; }
  .feedback-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: left; }
  .feedback-card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .feedback-card-score { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .feedback-card-score.good { color: var(--green); }
  .feedback-card-score.ok { color: #f5a623; }
  .feedback-card-score.bad { color: var(--red); }
  .feedback-card-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .feedback-notes { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: left; width: 100%; max-width: 600px; margin-bottom: 32px; }
  .feedback-notes-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
  .feedback-notes-text { font-size: 13px; line-height: 1.7; color: var(--text); }
  .score-actions { display: flex; gap: 12px; }
  .btn-try-again { background: var(--red); color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-try-again:hover { background: #c73652; }
  .btn-go-back { background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px 28px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-go-back:hover { border-color: var(--muted); }

  /* LOADING */
  .scoring-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .scoring-overlay.open { display: flex; }
  .scoring-overlay p { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <div class="logo-mark">C</div>
    <div class="logo-text"><span>Closer</span> AI</div>
  </a>
  <button class="btn-back" onclick="goBack()">← Back to Prospects</button>
</nav>

<!-- CALL VIEW -->
<div class="call-layout" id="callView">
  <!-- LEFT -->
  <div class="call-area">
    <div class="prospect-info">
      <div class="prospect-avatar" id="prospectAvatar">
        <div class="pulse-ring" id="pulseRing" style="display:none;"></div>
        ?
      </div>
      <div class="prospect-name-lg" id="prospectName">Loading...</div>
      <div class="prospect-role-lg" id="prospectRole">--</div>
    </div>

    <div class="call-status-area">
      <div class="call-timer-lg" id="callTimer">0:00</div>
      <div class="status-text" id="statusText">Ready to start your session</div>
    </div>

    <div class="call-controls">
      <button class="btn-mute" id="btnMute" onclick="toggleMute()" style="visibility:hidden;">🎤</button>
      <button class="btn-call-main start" id="btnMain" onclick="handleMainButton()">📞</button>
      <div style="width:48px;"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="transcript-panel">
    <div class="transcript-header">Live Transcript</div>
    <div class="transcript-messages" id="transcriptMessages">
      <div class="transcript-empty" id="transcriptEmpty">
        Start the session to see<br>the live conversation here.
      </div>
    </div>
  </div>
</div>

<!-- SCORE SCREEN -->
<div class="score-screen" id="scoreScreen">
  <div class="score-circle">
    <div class="score-number" id="scoreNumber">--</div>
    <div class="score-label">Score</div>
  </div>
  <div class="score-title" id="scoreTitle">Session Complete</div>
  <div class="score-subtitle" id="scoreSubtitle">Here's how you performed</div>
  <div class="feedback-grid" id="feedbackGrid"></div>
  <div class="feedback-notes" id="feedbackNotes" style="display:none;">
    <div class="feedback-notes-label">Coach Notes</div>
    <div class="feedback-notes-text" id="feedbackNotesText"></div>
  </div>
  <div class="score-actions">
    <button class="btn-go-back" onclick="goBack()">← Back to Prospects</button>
    <button class="btn-try-again" onclick="tryAgain()">Try Again</button>
  </div>
</div>

<!-- SCORING OVERLAY -->
<div class="scoring-overlay" id="scoringOverlay">
  <div style="font-size:32px;">⚡</div>
  <div style="font-weight:700;font-size:18px;">Analyzing your call...</div>
  <p>AI is scoring your performance. This takes a few seconds.</p>
</div>

<script src="/vapi.bundle.js"></script>
<script>
  // Get params from URL
  const params = new URLSearchParams(window.location.search);
  const assistantId = params.get('id');
  const prospectName = params.get('name') || 'Prospect';
  const prospectRole = params.get('role') || 'AI Prospect';
  const prospectInitials = params.get('initials') || prospectName.slice(0,2).toUpperCase();

  // Set prospect info
  document.getElementById('prospectName').textContent = prospectName;
  document.getElementById('prospectRole').textContent = prospectRole;
  document.getElementById('prospectAvatar').innerHTML = `<div class="pulse-ring" id="pulseRing" style="display:none;"></div>${prospectInitials}`;

  let vapi = null;
  let callActive = false;
  let callStarted = false;
  let muted = false;
  let timerInterval = null;
  let seconds = 0;
  let transcript = [];

  function goBack() {
    if (callActive) endCall();
    window.location.href = '/';
  }

  function tryAgain() {
    document.getElementById('scoreScreen').classList.remove('visible');
    document.getElementById('callView').style.display = 'grid';
    transcript = [];
    seconds = 0;
    document.getElementById('callTimer').textContent = '0:00';
    document.getElementById('transcriptMessages').innerHTML = '<div class="transcript-empty" id="transcriptEmpty">Start the session to see<br>the live conversation here.</div>';
    document.getElementById('btnMain').className = 'btn-call-main start';
    document.getElementById('btnMain').textContent = '📞';
    document.getElementById('btnMute').style.visibility = 'hidden';
    document.getElementById('statusText').textContent = 'Ready to start your session';
    document.getElementById('statusText').className = 'status-text';
  }

  async function handleMainButton() {
    if (!callActive) {
      await startCall();
    } else {
      endCall();
    }
  }

  async function startCall() {
    if (!assistantId) {
      document.getElementById('statusText').textContent = 'No assistant configured';
      document.getElementById('statusText').className = 'status-text error';
      return;
    }

    try {
      document.getElementById('statusText').textContent = 'Connecting...';
      document.getElementById('statusText').className = 'status-text connecting';
      document.getElementById('btnMain').style.opacity = '0.5';

      const VapiSDK = window.Vapi && window.Vapi.default ? window.Vapi.default : window.Vapi;
      vapi = new VapiSDK('0e4512c4-b8f0-4d20-90e2-2fe78b49d186');

      vapi.on('call-start', () => {
        callActive = true;
        callStarted = true;
        document.getElementById('statusText').textContent = 'Call live';
        document.getElementById('statusText').className = 'status-text active';
        document.getElementById('btnMain').className = 'btn-call-main end';
        document.getElementById('btnMain').textContent = '📵';
        document.getElementById('btnMain').style.opacity = '1';
        document.getElementById('btnMute').style.visibility = 'visible';
        document.getElementById('pulseRing').style.display = 'block';
        startTimer();
      });

      vapi.on('speech-start', () => {
        document.getElementById('prospectAvatar').classList.add('speaking');
        document.getElementById('prospectAvatar').classList.remove('listening');
      });

      vapi.on('speech-end', () => {
        document.getElementById('prospectAvatar').classList.remove('speaking');
      });

      vapi.on('message', (msg) => {
        if (msg.type === 'transcript' && msg.transcriptType === 'final') {
          const role = msg.role;
          const text = msg.transcript;
          transcript.push({ role, text });
          addMessage(role, text);
          if (role === 'user') {
            document.getElementById('prospectAvatar').classList.add('listening');
          }
        }
      });

      vapi.on('call-end', () => {
        callEnded();
      });

      vapi.on('error', (err) => {
        document.getElementById('statusText').textContent = 'Connection failed: ' + err.message;
        document.getElementById('statusText').className = 'status-text error';
        document.getElementById('btnMain').style.opacity = '1';
      });

      await vapi.start(assistantId);

    } catch (err) {
      document.getElementById('statusText').textContent = 'Failed to connect';
      document.getElementById('statusText').className = 'status-text error';
      document.getElementById('btnMain').style.opacity = '1';
    }
  }

  function endCall() {
    if (vapi) vapi.stop();
    callEnded();
  }

  function callEnded() {
    callActive = false;
    clearInterval(timerInterval);
    document.getElementById('pulseRing').style.display = 'none';
    document.getElementById('prospectAvatar').classList.remove('speaking', 'listening');
    document.getElementById('btnMute').style.visibility = 'hidden';

    if (transcript.length > 0) {
      scoreCall();
    } else {
      document.getElementById('statusText').textContent = 'Call ended';
      document.getElementById('statusText').className = 'status-text';
      document.getElementById('btnMain').className = 'btn-call-main start';
      document.getElementById('btnMain').textContent = '📞';
      document.getElementById('btnMain').style.opacity = '1';
    }
  }

  function toggleMute() {
    if (!vapi) return;
    muted = !muted;
    vapi.setMuted(muted);
    const btn = document.getElementById('btnMute');
    btn.textContent = muted ? '🔇' : '🎤';
    btn.classList.toggle('muted', muted);
  }

  function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('callTimer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }, 1000);
  }

  function addMessage(role, text) {
    const container = document.getElementById('transcriptMessages');
    const empty = document.getElementById('transcriptEmpty');
    if (empty) empty.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role === 'user' ? 'rep' : 'prospect'}`;
    const speakerLabel = role === 'user' ? 'You' : prospectName;
    const speakerClass = role === 'user' ? 'rep' : 'prospect';
    msg.innerHTML = `
      <div class="msg-speaker ${speakerClass}">${speakerLabel}</div>
      <div class="msg-text">${text}</div>
    `;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  async function scoreCall() {
    document.getElementById('scoringOverlay').classList.add('open');

    const transcriptText = transcript.map(t =>
      `${t.role === 'user' ? 'Sales Rep' : prospectName}: ${t.text}`
    ).join('\n');

    try {
      const res = await fetch('/api/score-call', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript: transcriptText, prospectName })
      });

      const data = await res.json();
      document.getElementById('scoringOverlay').classList.remove('open');
      showScore(data);

    } catch (err) {
      document.getElementById('scoringOverlay').classList.remove('open');
      showScore(getFallbackScore());
    }
  }

  function getFallbackScore() {
    return {
      overall: 72,
      categories: [
        { label: 'Objection Handling', score: 70, note: 'Addressed the objection but could be more direct.' },
        { label: 'Tonality', score: 75, note: 'Good energy, maintain confidence throughout.' },
        { label: 'Closing Attempt', score: 65, note: 'Try to ask for the close more assertively.' },
        { label: 'Rapport', score: 78, note: 'Good connection established early.' }
      ],
      notes: 'Overall solid attempt. Focus on handling the objection with more certainty. When they say they need to talk to their spouse, acknowledge it then redirect to their personal decision-making. Close more directly.'
    };
  }

  function showScore(data) {
    document.getElementById('callView').style.display = 'none';
    document.getElementById('scoreScreen').classList.add('visible');

    const overall = data.overall || 70;
    document.getElementById('scoreNumber').textContent = overall;

    const scoreColor = overall >= 80 ? 'var(--green)' : overall >= 60 ? '#f5a623' : 'var(--red)';
    document.getElementById('scoreNumber').style.color = scoreColor;
    document.querySelector('.score-circle').style.borderColor = scoreColor;

    const titles = { 80: 'Strong Performance', 60: 'Good Effort', 0: 'Needs Work' };
    const title = overall >= 80 ? 'Strong Performance' : overall >= 60 ? 'Good Effort' : 'Needs Work';
    document.getElementById('scoreTitle').textContent = title;
    document.getElementById('scoreSubtitle').textContent = `${Math.floor(seconds / 60)}:${(seconds % 60).toString().padStart(2,'0')} session with ${prospectName}`;

    const grid = document.getElementById('feedbackGrid');
    grid.innerHTML = '';
    (data.categories || []).forEach(cat => {
      const scoreClass = cat.score >= 80 ? 'good' : cat.score >= 60 ? 'ok' : 'bad';
      const card = document.createElement('div');
      card.className = 'feedback-card';
      card.innerHTML = `
        <div class="feedback-card-label">${cat.label}</div>
        <div class="feedback-card-score ${scoreClass}">${cat.score}/100</div>
        <div class="feedback-card-text">${cat.note}</div>
      `;
      grid.appendChild(card);
    });

    if (data.notes) {
      document.getElementById('feedbackNotes').style.display = 'block';
      document.getElementById('feedbackNotesText').textContent = data.notes;
    }
  }
</script>
</body>
</html>
