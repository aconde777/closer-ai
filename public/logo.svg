<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071528"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <linearGradient id="piece" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="25%" stop-color="#7dd3fc"/>
      <stop offset="65%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softshadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="bodyClip">
      <path d="M162,118 L238,118 L260,272 L140,272 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="72" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="1.5" y="1.5" width="397" height="397" rx="71" fill="none" stroke="rgba(14,165,233,0.2)" stroke-width="1.5"/>

  <!-- === KING PIECE === -->

  <!-- CROSS vertical -->
  <rect x="188" y="30" width="24" height="68" rx="9" fill="url(#piece)" filter="url(#softshadow)"/>
  <!-- CROSS horizontal -->
  <rect x="150" y="50" width="100" height="24" rx="9" fill="url(#piece)" filter="url(#softshadow)"/>

  <!-- Gem dots on cross tips -->
  <circle cx="200" cy="33" r="5" fill="white" opacity="0.55" filter="url(#glow)"/>
  <circle cx="152" cy="62" r="4" fill="white" opacity="0.45" filter="url(#glow)"/>
  <circle cx="248" cy="62" r="4" fill="white" opacity="0.45" filter="url(#glow)"/>

  <!-- COLLAR -->
  <rect x="168" y="98" width="64" height="20" rx="7" fill="url(#piece)"/>
  <!-- Collar highlight -->
  <rect x="173" y="101" width="54" height="5" rx="3" fill="rgba(255,255,255,0.22)"/>

  <!-- BODY -->
  <path d="M162,118 L238,118 L260,272 L140,272 Z" fill="url(#piece)" filter="url(#softshadow)"/>

  <!-- Body sheen (left side catch-light) -->
  <path d="M162,118 L200,118 L215,272 L140,272 Z" fill="url(#sheen)" clip-path="url(#bodyClip)" opacity="0.5"/>

  <!-- Single clean belt line -->
  <rect x="146" y="194" width="108" height="12" rx="2" fill="rgba(3,10,20,0.4)"/>
  <!-- Belt highlight -->
  <rect x="146" y="194" width="108" height="3" rx="1" fill="rgba(255,255,255,0.1)"/>

  <!-- BASE - main -->
  <rect x="96" y="272" width="208" height="36" rx="10" fill="url(#piece)" filter="url(#softshadow)"/>
  <!-- Base highlight -->
  <rect x="101" y="274" width="198" height="7" rx="5" fill="rgba(255,255,255,0.22)"/>

  <!-- BASE - bottom step -->
  <rect x="80" y="304" width="240" height="20" rx="8" fill="url(#piece)"/>
  <rect x="85" y="306" width="230" height="5" rx="3" fill="rgba(255,255,255,0.14)"/>

  <!-- Floor glow -->
  <ellipse cx="200" cy="330" rx="110" ry="10" fill="rgba(14,165,233,0.12)"/>
</svg>
