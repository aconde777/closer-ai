<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" rx="80" fill="#000000"/>
  <defs>
    <linearGradient id="mane-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="55%" stop-color="#D4920A"/>
      <stop offset="100%" stop-color="#8B5200"/>
    </linearGradient>
    <linearGradient id="face-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEE88"/>
      <stop offset="100%" stop-color="#E6AA00"/>
    </linearGradient>
    <linearGradient id="crown-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="100%" stop-color="#C88A00"/>
    </linearGradient>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mane glow -->
  <circle cx="200" cy="262" r="145" fill="#C8820A" opacity="0.15" filter="url(#glow-f)"/>

  <!-- Mane -->
  <circle cx="200" cy="262" r="132" fill="url(#mane-g)"/>

  <!-- Face -->
  <ellipse cx="200" cy="262" rx="88" ry="82" fill="url(#face-g)"/>

  <!-- Crown: 3 spikes + band -->
  <path d="M90,162 L90,140 L124,72 L158,140 L200,48 L242,140 L276,72 L310,140 L310,162 Z" fill="url(#crown-g)"/>
  <!-- Crown jewel dots -->
  <circle cx="124" cy="80" r="6" fill="#fff" opacity="0.6"/>
  <circle cx="200" cy="56" r="8" fill="#fff" opacity="0.7"/>
  <circle cx="276" cy="80" r="6" fill="#fff" opacity="0.6"/>

  <!-- Eyes -->
  <ellipse cx="160" cy="240" rx="20" ry="17" fill="#3B1A00"/>
  <ellipse cx="240" cy="240" rx="20" ry="17" fill="#3B1A00"/>
  <!-- Iris -->
  <ellipse cx="160" cy="241" rx="12" ry="10" fill="#7A3800"/>
  <ellipse cx="240" cy="241" rx="12" ry="10" fill="#7A3800"/>
  <!-- Pupil -->
  <ellipse cx="160" cy="242" rx="6" ry="8" fill="#1A0800"/>
  <ellipse cx="240" cy="242" rx="6" ry="8" fill="#1A0800"/>
  <!-- Eye shine -->
  <ellipse cx="154" cy="235" rx="5" ry="4" fill="#fff" opacity="0.55"/>
  <ellipse cx="234" cy="235" rx="5" ry="4" fill="#fff" opacity="0.55"/>

  <!-- Nose (inverted heart / T shape) -->
  <path d="M183,278 L200,260 L217,278 Q200,296 183,278 Z" fill="#A06010"/>
  <path d="M183,278 Q200,268 217,278" stroke="#8B5000" stroke-width="2" fill="none"/>

  <!-- Muzzle -->
  <path d="M175,290 Q200,310 225,290" stroke="#9A6000" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Whisker dots left -->
  <circle cx="144" cy="284" r="5" fill="#C8820A" opacity="0.45"/>
  <circle cx="134" cy="272" r="4" fill="#C8820A" opacity="0.35"/>
  <circle cx="144" cy="298" r="4" fill="#C8820A" opacity="0.3"/>

  <!-- Whisker dots right -->
  <circle cx="256" cy="284" r="5" fill="#C8820A" opacity="0.45"/>
  <circle cx="266" cy="272" r="4" fill="#C8820A" opacity="0.35"/>
  <circle cx="256" cy="298" r="4" fill="#C8820A" opacity="0.3"/>
</svg>
