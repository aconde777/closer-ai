<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Team - The Elite Closer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#030712; --card:#080f1e; --blue:#38bdf8; --text:#e2eaf8; --muted:#4a6080; --border:#0f2040; }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 0 60px rgba(56,189,248,0.08); }
  .logo { margin: 0 auto 24px; }
  h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; }
  h1 span { color: var(--blue); }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
  .btn { width: 100%; background: linear-gradient(135deg,#0ea5e9,#38bdf8); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-bottom: 12px; box-shadow: 0 0 20px rgba(56,189,248,0.25); }
  .btn:hover { box-shadow: 0 0 32px rgba(56,189,248,0.45); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); box-shadow: none; }
  .btn-outline:hover { border-color: rgba(56,189,248,0.3); color: var(--blue); box-shadow: none; transform: none; }
  .status { font-size: 13px; color: var(--muted); margin-top: 16px; }
  .status.error { color: #f87171; }
  .status.success { color: #4ade80; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/lion-logo.png" width="48" height="48" style="border-radius:12px;object-fit:cover;display:block;margin:0 auto;">
  </div>
  <h1>You're invited to join a <span>team</span></h1>
  <p class="sub" id="subText">Loading invite details...</p>

  <div id="actionArea" style="display:none;">
    <button class="btn" id="btnJoin" onclick="handleJoin()">Accept Invite &amp; Join Team</button>
    <p class="status" id="statusMsg"></p>
  </div>

  <div id="authArea" style="display:none;">
    <button class="btn" onclick="goAuth()">Create Account / Sign In</button>
    <p class="status">You'll be joined automatically after signing in.</p>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient('__SUPABASE_URL__', '__SUPABASE_ANON_KEY__');

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  async function init() {
    if (!token) {
      document.getElementById('subText').textContent = 'Invalid invite link.';
      return;
    }

    sessionStorage.setItem('joinToken', token);

    const { data: session } = await sb.auth.getSession();

    if (!session.session) {
      document.getElementById('subText').textContent = 'You need an account to join this team. Sign in or create one -- you\'ll be joined automatically after.';
      document.getElementById('authArea').style.display = 'block';
      return;
    }

    document.getElementById('subText').textContent = 'Your team is ready. Accept below to get full access and start training.';
    document.getElementById('actionArea').style.display = 'block';
  }

  async function handleJoin() {
    const btn = document.getElementById('btnJoin');
    const status = document.getElementById('statusMsg');
    btn.disabled = true;
    btn.textContent = 'Joining...';

    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch('/api/join-team', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ token })
    });
    const data = await res.json();

    if (!res.ok) {
      btn.disabled = false;
      btn.textContent = 'Accept Invite & Join Team';
      status.textContent = data.error;
      status.className = 'status error';
      return;
    }

    sessionStorage.removeItem('joinToken');
    status.textContent = 'You\'re in. Redirecting to the app...';
    status.className = 'status success';
    setTimeout(() => window.location.href = '/app', 1500);
  }

  function goAuth() {
    window.location.href = `/auth.html?redirect=/join.html?token=${token}`;
  }

  init();
</script>
</body>
</html>
